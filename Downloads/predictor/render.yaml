services:
  - type: web
    name: crown-picks
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --bind 0.0.0.0:$PORT --workers 1 --timeout 300 --worker-class gevent --worker-connections 1000 app:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
